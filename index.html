<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Qué significa?</title>
    
    <style>
        body {font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px;}
        #box {background: white; padding: 20px; max-width: 700px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        input {padding: 8px; width: 100%; margin-top: 10px;}
        button {margin-top: 10px; padding: 10px;}
        #feedback {margin-top: 10px;font-weight: bold;}
        #done {margin-top: 40px; font-size: 36px;font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="box">
    <h2>¿Qué significa en español?</h2>
    <p> Escribe la palabra/la frase en español (sin mayúsculas) </p>
    <p id="question"> Laster spørsmål…</p>
    <input type="text"  id="answer" placeholder="Tu respuesta">
    <button onclick="checkAnswer()">Responder</button>

    <p id="feedback"></p>
    <p id="stats"></p>
    <p id="final"></p>
</div>
<p id="done"></p>
<script>

["han/hun spiser kylling", 	"come pollo"],

["liker du meg?", 	"te gusto"],
["liker du oss?", 		"te gustamos"],
["jeg liker deg", 		"me gustas"],

["jeg liker det (flertall)", 	"me gustan"],

["jeg prøver å forstå", 	"intento entender"]

["jeg håper på solskinn", 		"espero el sol"],
["vi håper på bedre tider", 	"esperamos tiempos mejores"],
["du håper på gode nyheter", 	"esperas buenas noticias"],
["dere håper på sol", 		"esperáis el sol"],
["han håper på en telefon", 	"espera una llamada"],
["de håper på godt vær", 		"esperan buen tiempo"]

["jeg åpner vinduet", 	"abro la ventana"],
["vi åpner butikken", 	"abrimos la tienda"],
["du åpner døra", 	"abres la puerta"],
["dere åpner kofferten", 	"abrís la maleta"],

["de åpner gaven", 	"abren el regalo"]

["jeg ser en film", 	"veo una película"],
["vi ser en film",	 	"vemos una película"],
["du ser en film", 	"ves una película"],
["dere ser en film", 	"veis una película"],
["han/hun ser en film", 	"ve una película"],
["de ser en film", 	"ven una película"],

["jeg kan danse", 	"puedo bailar"],
["vi kan synge", 		"podemos cantar"],
["du kan løpe", 		"puedes correr"],
["dere kan lære", 	"podéis aprender"],
["han/hun kan skrive", 	"puede escribir"],
["de kan tegne", 		"pueden dibujar"],

["jeg vil løpe", 		"quiero correr"],
["vi vil løpe", 		"queremos correr"],
["du vil løpe", 		"quieres correr"],
["dere vil løpe", 		"queréis correr"],
["han/hun vil løpe", 	"quiere correr"],
["de vil løpe", 		"quieren correr"],

["jeg gjør oppgavene mine", 	"hago mis tareas"],
["vi oppgavene våre", 		"hacemos nuestras tareas"],
["hva gjør du?", 			"qué haces"],
["hva gjør dere?", 		"qué hacéis"],
["hva gjør han/hun/det?", 	"qué hace"],
["hva gjør de?", 			"qué hacen"],

["jeg sier sannheten", 	"digo la verdad"],
["vi sier farvel", 		"decimos adiós"],
["du sier hei", 		"dices hola"],
["dere sier ingenting", 	"decís nada"],
["han/hun sier ja", 	"dice sí"],
["de sier nei", 		"dicen no"],

["jeg må ha en bil",	"tengo que tener un coche"],
["jeg har en bil", 		"tengo un coche"],
["vi har en hund", 	"tenemos un perro"],
["du har tid", 		"tienes tiempo"],
["dere har et problem", 	"tenéis un problema"],
["han/hun har en venn", 	"tiene un amigo"],
["de har en plan", 	"tienen un plan"],

["jeg kommer til festen", 		"vengo a la fiesta"],
["vi kommer til festen", 		"venimos a la fiesta"],
["du kommer til festen", 		"vienes a la fiesta"],
["dere kommer til festen", 	"venís a la fiesta"],
["han/hun kommer til festen", 	"viene a la fiesta"],
["de kommer til festen", 		"vienen a la fiesta"],

["jeg drar", 	"salgo"],
["vi drar", 	"salimos"],
["du drar", 	"sales"],
["dere drar", 	"salís"],
["han/hun drar", "sale"],
["de drar", 	"salen"],

["det er en deilig pizza her", 	"hay una pizza deliciosa aquí"],
["jeg har spist", 			"he comido"],
["vi har reist", 			"hemos viajado"],
["du har sett", 			"has visto"],
["dere har lest", 			"habéis leído"],
["han har snakket", 		"ha hablado"],
["de har åpnet", 			"han abierto"],

["jeg er glad", 		"estoy feliz"],
["vi er hjemme", 		"estamos en casa"],
["du er sliten", 		"estás cansado"],
["dere er på ferie", 	"estáis de vacaciones"],
["han/hun er nervøs", 	"está nerviosa"],
["de er syke", 		"están enfermos"],

["jeg er lærer", 		"soy profesor"],
["vi er studenter", 	"somos estudiantes"],
["du er sjåfør", 		"eres conductor"],
["dere er elever", 	"sois alumnos"],
["han/hun er artist", 	"es artista"],
["de er leger", 		"son doctores"],

["jeg drar til parken", 		"voy al parque"],
["vi drar til stranden", 		"vamos a la playa"],
["du drar til festen", 		"vas a la fiesta"],
["dere drar til museet", 		"vais al museo"],
["hun drar til konserten", 		"va al concierto"],
["de drar til kinoen", 		"van al cine"],

["jeg vet det", 		"lo sé"],
["vi vet det", 		"lo sabemos"],
["du vet det", 		"lo sabes"],
["dere vet det", 		"lo sabéis"],
["han/hun vet det", 	"lo sabe"],
["de vet det", 		"lo saben"],


];

allWords.sort(() => Math.random() - 0.5);
let L = allWords.slice(0, 50);
let riktig = 0;
let feil = 0;
let index = 0;

const answerInput = document.getElementById("answer");
answerInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        checkAnswer();
    }
});

function nextQuestion() {
    if (L.length === 0) {
        let resultat = Math.round(100 * riktig / (riktig + feil));
        document.getElementById("final").innerText =
            "Tu puntuación final: " + resultat + "%";
        document.getElementById("done").innerText = "Has terminado";
        return;
    }
    index = Math.floor(Math.random() * L.length);
    document.getElementById("question").innerText =
        '¿Qué significa? "' + L[index][0] + '"';

    answerInput.value = "";
    answerInput.focus();
}

function checkAnswer() {
    if (L.length === 0) return;
    let svar = answerInput.value.trim();
    let fasit = L[index][1];
    if (svar === fasit) {
        riktig++;
        document.getElementById("feedback").innerText = "¡Bueno!";
        L.splice(index, 1);
    } else {
        feil++;
        document.getElementById("feedback").innerText =
            `"${fasit}" significa "${L[index][0]}"\nSe intentará de nuevo más tarde.`;
    }

    let prosent = Math.round(100 * riktig / (riktig + feil) * 10) / 10;
    document.getElementById("stats").innerText =
        `Errores: ${feil} | Correcto: ${riktig} | Puntuación: ${prosent}% | Restantes: ${L.length}`;
    nextQuestion();
}

nextQuestion();
</script>
</body>
</html>
